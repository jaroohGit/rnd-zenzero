name: Deploy RND Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: rnd-zenzero-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux
      - x64
      - rnd

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and build frontend
        shell: bash
        run: |
          set -euo pipefail
          npm ci --prefix frontend
          npm run build --prefix frontend

      - name: Deploy frontend dist to Caddy root
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_PATH="${DEPLOY_PATH:-/home/teddy/rnd-zenzero-public}"
          mkdir -p "$DEPLOY_PATH"
          rsync -a --delete ./frontend/dist/ "$DEPLOY_PATH"/

      - name: Update Caddy config via admin API
        shell: bash
        run: |
          # Use Caddy admin API (no sudo needed) — reload config at runtime
          if caddy adapt --config infra/Caddyfile 2>/dev/null \
             | curl -sf -X POST http://localhost:2019/load \
                 -H "Content-Type: application/json" -d @-; then
            echo "✓ Caddy config updated via admin API"
          else
            echo "⚠ Admin API unavailable — trying sudo fallback"
            sudo cp infra/Caddyfile /etc/caddy/Caddyfile && sudo systemctl reload caddy \
              && echo "✓ Caddy updated via sudo" \
              || echo "✗ Could not update Caddy — run manually on server:"
            echo "    sudo cp infra/Caddyfile /etc/caddy/Caddyfile && sudo systemctl reload caddy"
          fi

      - name: Verify deployment
        shell: bash
        run: |
          set -euo pipefail
          sleep 2
          curl -fsS https://rnd.zenzerobiogas.com >/dev/null
          echo "✓ Site accessible"
