name: Deploy RND Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: rnd-zenzero-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux
      - x64
      - rnd

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and build frontend
        shell: bash
        run: |
          set -euo pipefail
          npm ci --prefix frontend
          npm run build --prefix frontend

      - name: Deploy frontend dist to Caddy root
        shell: bash
        run: |
          set -euo pipefail

          DEPLOY_PATH="${DEPLOY_PATH:-/home/teddy/rnd-zenzero-public}"
          mkdir -p "$DEPLOY_PATH"

          rsync -a --delete ./frontend/dist/ "$DEPLOY_PATH"/

      - name: Verify deployment
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS https://rnd.zenzerobiogas.com >/dev/null